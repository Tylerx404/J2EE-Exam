<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="results">
    <section class="doctor-grid" th:if="${!doctorPage.isEmpty()}">
        <article class="doctor-card" th:each="doctor : ${doctorPage.content}">
            <img class="doctor-image" th:src="${doctor.image}" th:alt="${doctor.name}">
            <div class="doctor-content">
                <h2 th:text="${doctor.name}">BS. Mẫu</h2>
                <p>
                    <span>Chuyên khoa</span>
                    <strong th:text="${doctor.specialty}">Nội khoa</strong>
                </p>
                <p>
                    <span>Khoa</span>
                    <strong th:text="${doctor.department.name}">Nội tổng quát</strong>
                </p>
                <a class="book-button"
                   sec:authorize="hasRole('PATIENT')"
                   th:href="@{/enroll/doctors/{id}(id=${doctor.id})}">
                    Đặt lịch
                </a>
                <a class="login-to-book"
                   sec:authorize="isAnonymous()"
                   th:href="@{/login}">
                    Đăng nhập để đặt lịch
                </a>
            </div>
        </article>
    </section>

    <section class="empty-state" th:if="${doctorPage.isEmpty()}">
        <h2 th:text="${#strings.isEmpty(keyword)} ? 'Chưa có bác sĩ nào trong hệ thống' : 'Không tìm thấy bác sĩ phù hợp'">
            Chưa có bác sĩ nào trong hệ thống
        </h2>
        <p th:text="${#strings.isEmpty(keyword)} ? 'Hãy thêm dữ liệu bác sĩ vào cơ sở dữ liệu để hiển thị tại trang home.' : 'Thử tìm kiếm bằng từ khóa khác.'">
            Hãy thêm dữ liệu bác sĩ vào cơ sở dữ liệu để hiển thị tại trang home.
        </p>
    </section>

    <nav class="pagination" th:if="${totalPages > 0}">
        <a class="page-link ajax-page-link"
           th:classappend="${!doctorPage.hasPrevious()} ? ' disabled'"
           th:href="@{/home(page=${previousPage},keyword=${keyword})}">
            Trước
        </a>

        <a class="page-number ajax-page-link"
           th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}"
           th:classappend="${pageNumber == currentPage} ? ' active'"
           th:href="@{/home(page=${pageNumber},keyword=${keyword})}"
           th:text="${pageNumber + 1}">
            1
        </a>

        <a class="page-link ajax-page-link"
           th:classappend="${!doctorPage.hasNext()} ? ' disabled'"
           th:href="@{/home(page=${nextPage},keyword=${keyword})}">
            Sau
        </a>
    </nav>
</div>
</body>
</html>
